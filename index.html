<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash VPN - Moteur de Recherche Privé & Ultra-Rapide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tab-active { border-bottom: 3px solid #22c55e; color: #22c55e; } /* Vert Flash VPN */
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans">

    <header class="border-b border-slate-900 p-4 sticky top-0 bg-slate-950/95 backdrop-blur z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center gap-4">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                <div class="bg-gradient-to-r from-green-500 to-emerald-600 text-slate-950 px-3 py-1.5 rounded-xl font-black text-lg tracking-tighter shadow-lg shadow-green-500/20 flex items-center gap-1.5">
                    <i class="fa-solid fa-bolt-lightning text-slate-950"></i>
                    <span>FLASH <span class="font-light text-slate-900">VPN</span></span>
                </div>
            </div>
            
            <form id="search-form" class="flex-1 w-full max-w-3xl relative">
                <input type="text" id="search-input" placeholder="Recherche chiffrée, anonyme et sans traçage..." 
                    class="w-full bg-slate-900 text-white pl-12 pr-12 py-3 rounded-full border border-slate-800 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-all shadow-inner text-base">
                <i class="fa-solid fa-shield-halved absolute left-4 top-1/2 -translate-y-1/2 text-green-500/80"></i>
                <button type="button" id="clear-btn" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white hidden">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </form>
        </div>

        <div class="max-w-7xl mx-auto flex gap-6 mt-4 text-sm font-medium text-slate-400 border-b border-slate-900 px-2">
            <button onclick="changeCategory('general', this)" class="pb-2 tab-active transition-all"><i class="fa-solid fa-globe mr-2"></i>Web</button>
            <button onclick="changeCategory('images', this)" class="pb-2 hover:text-white transition-all"><i class="fa-solid fa-image mr-2"></i>Images</button>
            <button onclick="changeCategory('videos', this)" class="pb-2 hover:text-white transition-all"><i class="fa-solid fa-video mr-2"></i>Vidéos</button>
            <button onclick="changeCategory('news', this)" class="pb-2 hover:text-white transition-all"><i class="fa-solid fa-newspaper mr-2"></i>Actualités</button>
        </div>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto px-4 py-6">
        <div id="home-screen" class="text-center py-24 flex flex-col items-center">
            <div class="w-20 h-20 bg-green-500/10 border border-green-500/30 rounded-full flex items-center justify-center text-green-400 text-3xl mb-6 shadow-xl shadow-green-500/5">
                <i class="fa-solid fa-user-secret"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tight text-white mb-3">
                FLASH <span class="text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-400">VPN SEARCH</span>
            </h1>
            <p class="text-slate-400 max-w-md mx-auto text-sm leading-relaxed">
                Recherchez sur le Web à la vitesse de l'éclair. Vos requêtes sont protégées, sans cookies publicitaires et sans aucun historique conservé.
            </p>
        </div>

        <div id="loader" class="hidden flex flex-col items-center justify-center py-20 gap-4">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-green-500"></div>
            <p class="text-xs text-green-500 font-mono tracking-widest uppercase">Sécurisation du tunnel...</p>
        </div>

        <div id="results-container" class="space-y-6 hidden"></div>
    </main>

    <footer class="border-t border-slate-900 p-4 text-center text-xs text-slate-500 bg-slate-950">
        &copy; 2026 Flash VPN. Moteur de recherche indépendant et strictement No-Log.
    </footer>

    <script>
        let currentCategory = 'general';
        const searchForm = document.getElementById('search-form');
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('clear-btn');
        const homeScreen = document.getElementById('home-screen');
        const loader = document.getElementById('loader');
        const resultsContainer = document.getElementById('results-container');

        searchInput.addEventListener('input', () => {
            clearBtn.classList.toggle('hidden', searchInput.value === '');
        });
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearBtn.classList.add('hidden');
            searchInput.focus();
        });

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            performSearch();
        });

        function changeCategory(category, element) {
            currentCategory = category;
            document.querySelectorAll('header button').forEach(btn => btn.classList.remove('tab-active'));
            element.classList.add('tab-active');
            if(searchInput.value.trim() !== '') {
                performSearch();
            }
        }

        async function performSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            homeScreen.classList.add('hidden');
            resultsContainer.classList.add('hidden');
            loader.classList.remove('hidden');

            const apiUrl = `https://searx.space/backend/search?q=${encodeURIComponent(query)}&category=${currentCategory}&format=json&language=fr-FR`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                displayResults(data.results);
            } catch (error) {
                console.error("Erreur :", error);
                resultsContainer.innerHTML = `<p class="text-red-400 text-center font-mono text-sm">⚠️ Échec du routage sécurisé. Veuillez relancer la recherche.</p>`;
                loader.classList.add('hidden');
                resultsContainer.classList.remove('hidden');
            }
        }

        function displayResults(results) {
            loader.classList.add('hidden');
            resultsContainer.innerHTML = '';
            resultsContainer.classList.remove('hidden');

            if (!results || results.length === 0) {
                resultsContainer.innerHTML = `<p class="text-slate-400 text-center">Aucun résultat trouvé pour cette recherche chiffrée.</p>`;
                return;
            }

            if (currentCategory === 'images') {
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-2 md:grid-cols-3 gap-4";
                results.forEach(res => {
                    if(res.img_src) {
                        grid.innerHTML += `
                            <a href="${res.url}" target="_blank" class="group block bg-slate-900 rounded-xl overflow-hidden border border-slate-800 hover:border-green-500/40 transition-all">
                                <img src="${res.img_src}" alt="${res.title}" class="w-full h-48 object-cover bg-slate-800" onerror="this.src='https://placehold.co/300?text=Image+Protégée'">
                                <div class="p-3 text-xs text-slate-300 truncate group-hover:text-green-400">${res.title || 'Image'}</div>
                            </a>`;
                    }
                });
                resultsContainer.appendChild(grid);
            } else {
                results.forEach(res => {
                    const cleanUrl = new URL(res.url).hostname;
                    const item = document.createElement('div');
                    item.className = "bg-slate-900/40 p-5 rounded-2xl border border-slate-900 hover:border-slate-800 transition-all shadow-sm";
                    
                    item.innerHTML = `
                        <div class="text-xs text-green-400/80 mb-1 flex items-center gap-2 font-mono">
                            <i class="fa-solid fa-lock text-[10px]"></i>
                            <span>${cleanUrl}</span>
                        </div>
                        <a href="${res.url}" target="_blank" class="text-lg font-bold text-slate-100 hover:text-green-400 transition-colors block mb-2 leading-tight">
                            ${res.title}
                        </a>
                        <p class="text-sm text-slate-400 leading-relaxed">${res.content || res.length || 'Contenu masqué pour votre sécurité.'}</p>
                    `;
                    resultsContainer.appendChild(item);
                });
            }
        }
    </script>
</body>
</html>
